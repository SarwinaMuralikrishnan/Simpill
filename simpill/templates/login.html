{% extends "base.html" %}

{% block title %}Sign In – SimPill Healthcare{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-capsule-pill text-gradient-cyan-teal fs-1 mb-2"></i>
                    <h3 class="fw-bold text-white mb-1">Access Portal</h3>
                    <p class="text-secondary small">Enter your SimPill account details below</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <!-- Email input -->
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary small fw-medium">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text border-secondary border-opacity-25 bg-secondary bg-opacity-10 text-secondary">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control form-simpill-control" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                    </div>
                    
                    <!-- Password input -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <label for="password" class="form-label text-secondary small fw-medium mb-0">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text border-secondary border-opacity-25 bg-secondary bg-opacity-10 text-secondary">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control form-simpill-control" id="password" name="password" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary border-secondary border-opacity-25 bg-secondary bg-opacity-10 text-secondary password-toggle-btn" type="button" data-target="password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-simpill btn-simpill-primary w-100 py-3 mb-3">
                        Sign In <i class="bi bi-box-arrow-in-right ms-2"></i>
                    </button>
                    
                    <!-- Divider -->
                    <div class="d-flex align-items-center my-3 text-secondary">
                        <hr class="flex-grow-1 border-secondary border-opacity-25">
                        <span class="px-2 small text-secondary">NEW TO SIMPILL?</span>
                        <hr class="flex-grow-1 border-secondary border-opacity-25">
                    </div>
                    
                    <!-- Register Redirect -->
                    <div class="text-center">
                        <a href="{{ url_for('signup') }}" class="text-gradient-cyan-teal text-decoration-none small fw-semibold">
                            Create a Patient Account <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </form>
            </div>
            
            <!-- Default admin help card -->
            <div class="mt-4 text-center">
                <div class="p-3 bg-secondary bg-opacity-10 rounded-3 border border-secondary border-opacity-10">
                    <p class="text-secondary small mb-1"><strong>Demo Admin Credentials:</strong></p>
                    <code class="text-cyan small">admin@simpill.com</code> <span class="text-secondary small">/</span> <code class="text-cyan small">admin123</code>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
